<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Which National Park Are You?</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Welcome ─────────────────────────────────────────────────────────── -->
  <section id="welcome" class="screen active">
    <div class="welcome-inner">
      <div class="welcome-icon">⛰</div>
      <h1>Which National Park<br>Are You?</h1>
      <p class="welcome-sub">
        14 questions. 69 parks. Find your perfect match.
      </p>
      <button id="start-btn" class="btn-primary">Start the Quiz →</button>
      <p class="welcome-note">Runs entirely in your browser. No data collected.</p>
    </div>
  </section>

  <!-- ── Filter ───────────────────────────────────────────────────────────── -->
  <section id="filter" class="screen">
    <div class="filter-inner">
      <h2 class="filter-title">Which parks should we consider?</h2>

      <div class="scope-options">
        <button class="scope-btn active" data-scope="any">Any US park</button>
        <button class="scope-btn" data-scope="lower48">Lower 48 states only</button>
        <button class="scope-btn" data-scope="distance">Within distance of me</button>
      </div>

      <div id="location-panel" class="location-panel" style="display:none">
        <p class="filter-sub">Your starting location:</p>
        <div class="location-row">
          <button id="geolocate-btn" class="btn-locate">📍 Use my location</button>
          <span class="loc-or">or</span>
          <div class="zip-row">
            <input id="zip-input" class="zip-input" type="text" inputmode="numeric" placeholder="ZIP code" maxlength="5">
            <button id="zip-btn" class="btn-zip">→</button>
          </div>
        </div>
        <p id="location-status" class="location-status"></p>
        <p id="dist-label" class="filter-sub" style="display:none">Maximum distance:</p>
        <div id="distance-options" class="distance-options" style="display:none">
          <button class="dist-btn" data-miles="500">500 mi</button>
          <button class="dist-btn" data-miles="1000">1,000 mi</button>
          <button class="dist-btn" data-miles="1500">1,500 mi</button>
        </div>
        <p id="park-count" class="park-count"></p>
      </div>

      <button id="filter-start-btn" class="btn-primary" style="margin-top:2rem">Start Quiz →</button>
    </div>
  </section>

  <!-- ── Quiz ────────────────────────────────────────────────────────────── -->
  <section id="quiz" class="screen">
    <div class="quiz-topbar">
      <div class="progress-track">
        <div id="progress-fill" class="progress-fill"></div>
      </div>
      <span id="progress-label" class="progress-label">1 of 14</span>
    </div>
    <div class="quiz-body">
      <div class="question-wrap">
        <p id="q-text" class="question-text"></p>
        <div id="answers" class="answers-list"></div>
        <button id="back-btn" class="btn-back" style="display:none">← Back</button>
      </div>
    </div>
  </section>

  <!-- ── Results ──────────────────────────────────────────────────────────── -->
  <section id="results" class="screen">
    <div class="results-topbar">
      <div>
        <h2 class="results-title">Your Matches</h2>
        <p id="top-match-label" class="results-sub"></p>
      </div>
      <button id="retake-btn" class="btn-ghost">↩ Retake Quiz</button>
    </div>
    <div class="results-body">

      <aside class="sidebar">
        <div id="match-cards" class="match-cards"></div>
        <div class="profile-box">
          <h3 class="profile-title">Your Profile</h3>
          <div id="profile-bars" class="profile-bars"></div>
        </div>
      </aside>

      <div id="map" class="map-pane"></div>

    </div>
  </section>

  <script src="parks_data.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="quiz.js"></script>
</body>
</html>
